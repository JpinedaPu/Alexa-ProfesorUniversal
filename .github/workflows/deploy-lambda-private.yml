name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Lambda Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: lambda
        run: npm install --omit=dev

      - name: Verify secret files present
        run: |
          for f in lambda/handlers/SecretRouteIntentHandler.js lambda/handlers/artesLiberalesRoutes.js lambda/services/elevenlabs.js; do
            if [ ! -f "$f" ]; then echo "❌ Falta: $f" && exit 1; fi
          done
          echo "✅ Archivos secretos presentes"

      - name: Zip Lambda package
        run: |
          cd lambda
          zip -r ../lambda_deploy.zip . -x "*.git*" -x "tests/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Wait for Lambda to be ready
        run: aws lambda wait function-updated --function-name AlexaProfesorUniversal --region us-east-1

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name AlexaProfesorUniversal \
            --zip-file fileb://lambda_deploy.zip \
            --region us-east-1

      - name: Wait for deploy to complete
        run: |
          aws lambda wait function-updated --function-name AlexaProfesorUniversal --region us-east-1
          echo "✅ Lambda actualizada"
