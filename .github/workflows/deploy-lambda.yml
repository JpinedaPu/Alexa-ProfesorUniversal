    name: Deploy Lambda Code
    runs-on: ubuntu-latest
    steps:
      - name: Deploy deshabilitado en repo publico
        run: |
          echo "⛔ El deploy a Lambda se hace SOLO desde el repo privado."
          echo "Este workflow existe solo como referencia de la configuración."
