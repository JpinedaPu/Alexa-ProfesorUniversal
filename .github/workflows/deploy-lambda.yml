# NOTA: alexa-hosted-version/ existe solo localmente, no se sube al repo.
# Este workflow aplica a lambda/ (version AWS Lambda produccion).
# Skill ID: amzn1.ask.skill.91893f76-ab13-4ee2-ad95-d803f3434ee5
# Lambda: arn:aws:lambda:us-east-1:811710375370:function:AlexaProfesorUniversal

name: Deploy to AWS Lambda

# DESHABILITADO: El deploy a Lambda se hace SOLO desde el repo privado
# (Alexa-ProfesorUniversal-private) que incluye los archivos del modo secreto.
# Este workflow en el repo público NO debe deployar porque excluye archivos
# que index.js requiere, causando Runtime.ImportModuleError en Lambda.
on:
  workflow_dispatch: # Solo manual, nunca automático

jobs:
  deploy:
    name: Deploy Lambda Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: lambda
        run: npm install --omit=dev

      - name: Zip Lambda package
        run: |
          cd lambda
          zip -r ../lambda_deploy.zip . \
            -x "*.git*" \
            -x "handlers/SecretRouteIntentHandler.js" \
            -x "handlers/artesLiberalesRoutes.js" \
            -x "services/elevenlabs.js" \
            -x "tests/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Wait for Lambda to be ready
        run: |
          echo "⏳ Esperando que Lambda esté libre..."
          aws lambda wait function-updated \
            --function-name AlexaProfesorUniversal \
            --region us-east-1
          echo "✅ Lambda lista para deploy"

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name AlexaProfesorUniversal \
            --zip-file fileb://lambda_deploy.zip \
            --region us-east-1

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name AlexaProfesorUniversal \
            --region us-east-1
          echo "✅ Lambda actualizada exitosamente!"
